<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin:0;
    height:100%;
    background:#d9d3bd;
    font-family:'Roboto', sans-serif;
}

/* верх */
.topbar {
    display:flex;
    justify-content:flex-end;
    padding:12px 14px;
}

.notify {
    background:#ececec;
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
}

/* карточка */
.card {
    position:fixed;
    top:68px;
    left:12px;
    right:12px;
    bottom:0;

    background:#e6e0c9;
    border-radius:22px 22px 0 0;
    border:1px solid rgba(0,0,0,0.28);

    display:flex;
    flex-direction:column;
}

/* header */
.card-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px 10px;
    font-size:20px;
    font-weight:500;
}

/* герб */
.crest {
    width:20px;
    height:20px;
    margin-top:2px;
}

/* блок */
.row {
    display:flex;
    gap:12px;
    padding:0 16px 16px;
}

/* фото */
.photo {
    width:92px;
    height:118px;
    border-radius:12px;
    background:#cfcfcf;
}

/* текст */
.info {
    font-size:14px;
    line-height:1.25;
}

.info b {
    font-size:17px;
    font-weight:700;
}

/* полоса */
.marquee {
    background:#6b5a2b;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding:7px 0;
    padding-left:100%;
    font-size:13px;
    animation:scroll 12s linear infinite;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* низ */
.name-section {
    padding:14px 16px 22px;
    position:relative;
}

.status {
    font-size:13px;
    margin-bottom:6px;
    color:#6b6b6b;
}

.name {
    font-size:22px;
    font-weight:700;
    line-height:1.1;
    letter-spacing:0.2px;
}

/* кнопка */
.fab {
    position:absolute;
    right:18px;
    bottom:22px;
    width:56px;
    height:56px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#fff;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="card-header">
        <div>Резерв ID</div>

        <!-- герб -->
        <svg class="crest" viewBox="0 0 24 24">
            <path fill="#000" d="M12 2L5 5v6c0 4.8 3.4 9.1 7 10 3.6-0.9 7-5.2 7-10V5l-7-3z"/>
            <path fill="#fff" d="M12 6c-1.5 0-2.5 1.2-2.5 2.8V17h1.8V9.2c0-.6.3-1 .7-1s.7.4.7 1V17h1.8V8.8C14.5 7.2 13.5 6 12 6z"/>
        </svg>
    </div>

    <div class="row">
        <div class="photo"></div>

        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>
            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="marquee">
        <span>Документ оновлено • Військовозобов'язаний • Резерв ID</span>
    </div>

    <div class="name-section">
        <div class="status">Військовозобов'язаний</div>

        <div class="name">
            ЛУКАШЕНКО ВІТАЛІЙ<br>
            МИКОЛАЙОВИЧ
        </div>

        <div class="fab">+</div>
    </div>

</div>

</body>
</html>
