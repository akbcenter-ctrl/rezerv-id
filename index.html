<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Резерв ID</title>

<style>
body {
    margin:0;
    background:#d6d2bf;
    font-family: Arial, sans-serif;
}

/* экран */
.phone {
    max-width:420px;
    margin:0 auto;
}

/* верх */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:12px 16px;
    font-size:18px;
}

.notify {
    background:#e9e9e9;
    padding:6px 14px;
    border-radius:20px;
}

/* карточка */
.card {
    margin:10px 12px 0;
    background:#e3dfcc;
    border-radius:22px;
    padding:16px;
}

.row {
    display:flex;
    gap:14px;
}

.photo {
    width:110px;
    height:130px;
    background:#cfcfcf;
    border-radius:14px;
}

.info {
    font-size:15px;
    line-height:1.4;
}

.info b {
    font-size:17px;
}

/* полоса */
.marquee {
    margin-top:12px;
    background:#6b5a2b;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 12s linear infinite;
    padding:10px 0;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* имя */
.name-block {
    background:#e3dfcc;
    margin:0 12px;
    padding:18px 16px 24px;
    border-bottom-left-radius:22px;
    border-bottom-right-radius:22px;
    font-weight:bold;
    font-size:20px;
}

/* кнопка */
.fab {
    position:fixed;
    right:20px;
    bottom:90px;
    width:64px;
    height:64px;
    background:#ff8c00;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    color:#fff;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* нижнее меню */
.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    max-width:420px;
    background:#efefef;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    font-size:13px;
}
</style>
</head>

<body>

<div class="phone">

<div class="topbar">
    <div>21:28</div>
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">
    <div class="row">
        <div class="photo"></div>

        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>

            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>
</div>

<div class="marquee">
    <span>Документ оновлено о 04:16 | 18.02.2026 • Військовозобов'язаний</span>
</div>

<div class="name-block">
    ЛУКАШЕНКО ВІТАЛІЙ<br>
    МИКОЛАЙОВИЧ
</div>

</div>

<div class="fab">+</div>

<div class="bottom">
    <div>Резерв</div>
    <div>Сервіси</div>
    <div>Вакансії</div>
    <div>Меню</div>
</div>

</body>
</html>
