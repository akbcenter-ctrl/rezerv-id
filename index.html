<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin:0;
    height:100%;
    background:#d9d3bd;
    font-family:'Roboto', sans-serif;
    overflow:hidden;
}

/* верх */
.topbar {
    display:flex;
    justify-content:flex-end;
    padding:14px 20px;
}

.notify {
    background:#ececec;
    padding:6px 16px;
    border-radius:20px;
    font-size:14px;
}

/* главный экран как в приложении */
.card {
    position:fixed;
    top:64px;
    left:0;
    right:0;
    bottom:0;

    background:#e6e0c9;
    border-radius:24px 24px 0 0;

    display:flex;
    flex-direction:column;
}

/* header */
.card-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px 10px;
    font-size:22px;
    font-weight:500;
}

/* герб */
.crest {
    width:22px;
    height:22px;
}

/* блок с фото */
.row {
    display:flex;
    gap:14px;
    padding:0 20px 18px;
}

/* фото */
.photo {
    width:100px;
    height:130px;
    border-radius:14px;
    background:#cfcfcf;
}

/* инфо */
.info {
    font-size:15px;
    line-height:1.3;
}

.info b {
    font-size:18px;
    font-weight:700;
}

/* полоса */
.marquee {
    background:#6b5a2b;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding:8px 0;
    padding-left:100%;
    font-size:13px;
    animation:scroll 10s linear infinite;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* нижний блок */
.name-section {
    padding:18px 20px 32px;
    position:relative;
}

.status {
    font-size:14px;
    color:#6b6b6b;
    margin-bottom:8px;
}

.name {
    font-size:24px;
    font-weight:700;
    line-height:1.1;
}

/* кнопка */
.fab {
    position:absolute;
    right:24px;
    top:50%;
    transform:translateY(-20%);
    width:62px;
    height:62px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    color:#fff;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="card-header">
        <div>Резерв ID</div>

        <!-- герб -->
        <svg class="crest" viewBox="0 0 24 24">
            <path fill="#000" d="M12 2L5 5v6c0 4.8 3.4 9.1 7 10 3.6-0.9 7-5.2 7-10V5l-7-3z"/>
            <path fill="#fff" d="M12 6c-1.5 0-2.5 1.2-2.5 2.8V17h1.8V9.2c0-.6.3-1 .7-1s.7.4.7 1V17h1.8V8.8C14.5 7.2 13.5 6 12 6z"/>
        </svg>
    </div>

    <div class="row">
        <div class="photo"></div>

        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>
            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="marquee">
        <span>Документ оновлено • Військовозобов'язаний • Резерв ID</span>
    </div>

    <div class="name-section">
        <div class="status">Військовозобов'язаний</div>

        <div class="name">
            ЛУКАШЕНКО ВІТАЛІЙ<br>
            МИКОЛАЙОВИЧ
        </div>

        <div class="fab">+</div>
    </div>

</div>

</body>
</html>
