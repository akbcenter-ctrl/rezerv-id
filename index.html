<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<link rel="manifest" href="manifest.json">

<style>
html,body{
margin:0;
height:100%;
background:#d9d3bd;
font-family:Arial;
}

/* верх */
.top{
display:flex;
justify-content:flex-end;
padding:14px 20px;
}

.btn{
background:#eee;
padding:6px 16px;
border-radius:20px;
font-size:14px;
}

/* экран */
.card{
position:fixed;
top:64px;
left:0;
right:0;
bottom:0;
background:#e6e0c9;
border-radius:24px 24px 0 0;
display:flex;
flex-direction:column;
}

/* header */
.header{
display:flex;
justify-content:space-between;
padding:16px 20px 10px;
font-size:22px;
}

/* блок */
.row{
display:flex;
gap:14px;
padding:0 20px 18px;
}

.photo{
width:100px;
height:130px;
background:#ccc;
border-radius:14px;
}

.info{
font-size:15px;
line-height:1.3;
}

.info b{
font-size:18px;
}

/* полоса */
.bar{
background:#6b5a2b;
color:#fff;
padding:8px 0;
overflow:hidden;
white-space:nowrap;
}

.bar span{
display:inline-block;
padding-left:100%;
animation:run 10s linear infinite;
}

@keyframes run{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* низ */
.bottom{
padding:18px 20px 30px;
position:relative;
}

.status{
color:#666;
font-size:14px;
margin-bottom:6px;
}

.name{
font-size:24px;
font-weight:bold;
line-height:1.1;
}

/* кнопка */
.fab{
position:absolute;
right:24px;
top:50%;
transform:translateY(-30%);
width:62px;
height:62px;
background:#ff8a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:#fff;
}
</style>
</head>

<body>

<div class="top">
<div class="btn">Сповіщення 🔔</div>
</div>

<div class="card">

<div class="header">
<div>Резерв ID</div>
<div>🛡</div>
</div>

<div class="row">
<div class="photo"></div>
<div class="info">
Дата народження:<br>
<b>23.03.1984</b><br><br>
Відстрочка до:<br>
<b>завершення мобілізації</b>
</div>
</div>

<div class="bar">
<span>Документ оновлено • Військовозобов'язаний • Резерв ID</span>
</div>

<div class="bottom">
<div class="status">Військовозобов'язаний</div>

<div class="name">
ЛУКАШЕНКО ВІТАЛІЙ<br>
МИКОЛАЙОВИЧ
</div>

<div class="fab">+</div>
</div>

</div>

</body>
</html>
