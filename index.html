<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#d9d3bd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
    margin:0;
    background:#d9d3bd;
    font-family:'Roboto', sans-serif;
}

/* статус бар */
.statusbar {
    display:flex;
    justify-content:space-between;
    padding:4px 10px;
    font-size:13px;
}

/* верх */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:8px 14px 4px;
    font-size:18px;
}

.notify {
    background:#ececec;
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
}

/* карточка */
.card {
    margin:8px 10px;
    background:#e6e0c9;
    border-radius:20px;
    border:1px solid rgba(0,0,0,0.25);
    overflow:hidden;
}

/* header */
.card-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 14px 8px;
    font-size:20px;
    font-weight:500;
}

/* герб */
.crest {
    width:22px;
    height:22px;
    margin-top:2px;
}

/* контент */
.row {
    display:flex;
    gap:10px;
    padding:0 14px 10px;
}

/* фото */
.photo {
    width:96px;
    height:120px;
    border-radius:10px;
    background:#cfcfcf;
}

/* текст */
.info {
    font-size:14px;
    line-height:1.3;
}

.info b {
    font-size:16px;
    font-weight:700;
}

/* полоса */
.marquee {
    background:#6b5a2b;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding:6px 0;
    padding-left:100%;
    font-size:13px;
    animation:scroll 13s linear infinite;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* низ */
.name-section {
    position:relative;
    padding:12px 14px 16px;
}

.status {
    font-size:13px;
    color:#6c6c6c;
    margin-bottom:6px;
}

.name {
    font-size:21px;
    font-weight:700;
    line-height:1.15;
    letter-spacing:0.3px;
}

/* кнопка */
.fab {
    position:absolute;
    right:14px;
    bottom:14px;
    width:54px;
    height:54px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:#fff;
}

/* низ меню */
.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    background:#efefef;
    display:flex;
    justify-content:space-around;
    padding:10px 0 8px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="statusbar">
    <div>21:28</div>
    <div>📶 📶 📶 🔋80%</div>
</div>

<div class="topbar">
    <div></div>
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="card-header">
        <div>Резерв ID</div>

        <!-- герб -->
        <svg class="crest" viewBox="0 0 24 24">
          <path fill="#000" d="M12 2L5 5v6c0 4.8 3.4 9.1 7 10 3.6-0.9 7-5.2 7-10V5l-7-3z"/>
          <path fill="#fff" d="M12 6c-1.5 0-2.5 1.2-2.5 2.8V17h1.8V9.2c0-.6.3-1 .7-1s.7.4.7 1V17h1.8V8.8C14.5 7.2 13.5 6 12 6z"/>
          <path fill="#fff" d="M9 7.5c-1.2 0-2 1-2 2.4V17h1.6V10c0-.5.2-.8.4-.8s.4.3.4.8V17H11V9.9c0-1.4-.8-2.4-2-2.4z"/>
          <path fill="#fff" d="M15 7.5c-1.2 0-2 1-2 2.4V17h1.6V10c0-.5.2-.8.4-.8s.4.3.4.8V17H17V9.9c0-1.4-.8-2.4-2-2.4z"/>
        </svg>
    </div>

    <div class="row">
        <div class="photo"></div>

        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>

            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="marquee">
        <span>Документ оновлено • Військовозобов'язаний • Резерв ID</span>
    </div>

    <div class="name-section">
        <div class="status">Військовозобов'язаний</div>

        <div class="name">
            ЛУКАШЕНКО ВІТАЛІЙ<br>
            МИКОЛАЙОВИЧ
        </div>

        <div class="fab">+</div>
    </div>

</div>

<div class="bottom">
    <div>Резерв ID</div>
    <div>Сервіси</div>
    <div>Вакансії</div>
    <div>Меню</div>
</div>

</body>
</html>
