<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#d9d3bd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
    margin:0;
    background:#d9d3bd;
    font-family:'Roboto', sans-serif;
}

/* статус бар */
.statusbar {
    display:flex;
    justify-content:space-between;
    padding:6px 12px;
    font-size:14px;
}

/* верх */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:10px 16px;
    font-size:18px;
}

.notify {
    background:#ececec;
    padding:6px 16px;
    border-radius:22px;
}

/* карточка */
.card {
    margin:12px;
    background:#e7e1cb;
    border-radius:18px;
    border:1px solid rgba(0,0,0,0.25);
    overflow:hidden;
}

/* header */
.card-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    font-size:22px;
    font-weight:500;
}

/* герб */
.crest {
    width:26px;
    height:26px;
}

/* контент */
.row {
    display:flex;
    gap:16px;
    padding:0 16px 16px;
}

.photo {
    width:120px;
    height:150px;
    border-radius:12px;
    object-fit:cover;
    background:#ccc;
}

.info {
    font-size:15px;
    line-height:1.4;
}

.info b {
    font-size:18px;
}

/* бегущая строка */
.marquee {
    background:#6a5a2a;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 12s linear infinite;
    padding:10px 0;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* имя */
.name-section {
    position:relative;
    padding:16px;
}

.status {
    color:#666;
    font-size:14px;
    margin-bottom:8px;
}

.name {
    font-size:22px;
    font-weight:700;
}

/* кнопка */
.fab {
    position:absolute;
    right:16px;
    bottom:16px;
    width:58px;
    height:58px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#fff;
}

/* низ */
.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    background:#efefef;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    font-size:13px;
}
</style>
</head>

<body>

<!-- статус -->
<div class="statusbar">
    <div>21:28</div>
    <div>📶 📶 📶 🔋80%</div>
</div>

<div class="topbar">
    <div></div>
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="card-header">
        <div>Резерв ID</div>

        <!-- герб -->
        <svg class="crest" viewBox="0 0 24 24" fill="black">
            <path d="M12 2L4 5v6c0 5 3.8 9.7 8 11 4.2-1.3 8-6 8-11V5l-8-3z"/>
        </svg>
    </div>

    <div class="row">
        <div class="photo"></div>

        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>

            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="marquee">
        <span>Документ оновлено • Військовозобов'язаний • Резерв ID</span>
    </div>

    <div class="name-section">
        <div class="status">Військовозобов'язаний</div>

        <div class="name">
            ЛУКАШЕНКО ВІТАЛІЙ<br>
            МИКОЛАЙОВИЧ
        </div>

        <div class="fab">+</div>
    </div>

</div>

<div class="bottom">
    <div>Резерв ID</div>
    <div>Сервіси</div>
    <div>Вакансії</div>
    <div>Меню</div>
</div>

<script>
/* встроенный service worker */
if ('serviceWorker' in navigator) {
    const swCode = `
        self.addEventListener('install', e => {
            self.skipWaiting();
        });
        self.addEventListener('fetch', e => {});
    `;
    const blob = new Blob([swCode], { type: 'text/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl);
}
</script>

</body>
</html>
