<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:#d9d3bd;
    font-family:'Roboto', sans-serif;
}

/* верх */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:14px 16px;
    font-size:18px;
}

.notify {
    background:#ececec;
    padding:6px 16px;
    border-radius:22px;
    font-size:15px;
}

/* карточка */
.card {
    margin:12px;
    background:#e7e1cb;
    border-radius:18px;
    border:1px solid rgba(0,0,0,0.25);
    overflow:hidden;
}

/* header */
.card-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    font-size:22px;
    font-weight:500;
}

.crest {
    width:26px;
    height:26px;
    background:black;
    border-radius:6px;
}

/* контент */
.row {
    display:flex;
    gap:16px;
    padding:0 16px 16px;
}

.photo {
    width:120px;
    height:150px;
    border-radius:12px;
    object-fit:cover;
}

.info {
    font-size:15px;
    line-height:1.4;
}

.info b {
    font-size:18px;
    font-weight:700;
}

/* бегущая строка */
.marquee {
    background:#6a5a2a;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 12s linear infinite;
    padding:10px 0;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* низ карточки */
.name-section {
    position:relative;
    padding:16px;
}

.status {
    color:#6c6c6c;
    font-size:14px;
    margin-bottom:8px;
}

.name {
    font-weight:700;
    font-size:22px;
    line-height:1.2;
}

/* кнопка внутри */
.fab {
    position:absolute;
    right:16px;
    bottom:16px;
    width:58px;
    height:58px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#fff;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* низ */
.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    background:#efefef;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    font-size:13px;
}
</style>
</head>

<body>

<div class="topbar">
    <div>21:28</div>
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="card-header">
        <div>Резерв ID</div>
        <div class="crest"></div>
    </div>

    <div class="row">
        <img src="https://i.imgur.com/1X6QZ6b.jpg" class="photo">
        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>

            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="marquee">
        <span>Документ оновлено о 04:16 | 18.02.2026 • Військовозобов'язаний • Резерв ID</span>
    </div>

    <div class="name-section">
        <div class="status">Військовозобов'язаний</div>

        <div class="name">
            ЛУКАШЕНКО ВІТАЛІЙ<br>
            МИКОЛАЙОВИЧ
        </div>

        <div class="fab">+</div>
    </div>

</div>

<div class="bottom">
    <div>Резерв ID</div>
    <div>Сервіси</div>
    <div>Вакансії</div>
    <div>Меню</div>
</div>

</body>
</html>
