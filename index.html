<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резерв ID</title>

<style>
body {
    margin:0;
    background:#d9d3bd; /* точнее цвет */
    font-family: Roboto, Arial, sans-serif;
}

/* контейнер */
.phone {
    max-width:420px;
    margin:0 auto;
}

/* верх */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
    font-size:18px;
}

.notify {
    background:#ececec;
    padding:6px 16px;
    border-radius:22px;
    font-size:15px;
}

/* карточка */
.card {
    margin:8px 12px;
    background:#e7e1cb;
    border-radius:24px;
    overflow:hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
}

/* верх карточки */
.row {
    display:flex;
    gap:16px;
    padding:18px;
}

/* фото */
.photo {
    width:115px;
    height:140px;
    background:#cfcfcf;
    border-radius:16px;
}

/* текст */
.info {
    font-size:15px;
    line-height:1.35;
}

.info b {
    font-size:18px;
    font-weight:700;
}

/* бегущая строка */
.marquee {
    background:#6a5a2a;
    color:#fff;
    font-size:15px;
    overflow:hidden;
    white-space:nowrap;
}

.marquee span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 11s linear infinite;
    padding:9px 0;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

/* имя */
.name {
    padding:18px;
    font-weight:700;
    font-size:21px;
    line-height:1.25;
}

/* кнопка */
.fab {
    position:fixed;
    right:22px;
    bottom:95px;
    width:66px;
    height:66px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    color:#fff;
    box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

/* низ */
.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    max-width:420px;
    background:#efefef;
    display:flex;
    justify-content:space-around;
    padding:12px 0 10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="phone">

<div class="topbar">
    <div>21:28</div>
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="row">
        <div class="photo"></div>

        <div class="info">
            Дата народження:<br>
            <b>23.03.1984</b><br><br>

            Відстрочка до:<br>
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="marquee">
        <span>Документ оновлено о 04:16 | 18.02.2026 • Військовозобов'язаний • Резерв ID</span>
    </div>

    <div class="name">
        ЛУКАШЕНКО ВІТАЛІЙ<br>
        МИКОЛАЙОВИЧ
    </div>

</div>

</div>

<div class="fab">+</div>

<div class="bottom">
    <div>Резерв</div>
    <div>Сервіси</div>
    <div>Вакансії</div>
    <div>Меню</div>
</div>

</body>
</html>
