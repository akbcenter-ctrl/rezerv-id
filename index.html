<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Резерв ID</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial}

body{
    background:#d6d2bf;
}

/* верх */
.top{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.time{
    font-size:20px;
}

.notify{
    background:#ecebe7;
    padding:10px 16px;
    border-radius:24px;
    font-size:16px;
}

/* карточка */
.card{
    position:fixed;
    top:64px;
    left:0;
    right:0;
    bottom:0;

    background:#e6e0c9;
    border-radius:24px 24px 0 0;

    display:flex;
    flex-direction:column;
}

/* header */
.header{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:26px;
}

/* герб */
.coat{
    width:28px;
    height:28px;
}

/* контент */
.content{
    display:flex;
    gap:14px;
    padding:0 18px;
}

.photo{
    width:110px;
    height:150px;
    background:#bbb;
    border-radius:14px;
}

.info{
    font-size:16px;
}

.info b{
    display:block;
    font-size:20px;
    margin:4px 0 12px;
}

/* полоса */
.bar{
    margin-top:16px;
    background:#7b6a33;
    color:#fff;
    padding:8px 14px;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
}

.bar span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 12s linear infinite;
}

@keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-100%)}
}

/* растяжка */
.spacer{
    flex:1;
}

/* низ */
.bottom{
    padding:18px 20px 34px;
    position:relative;
}

.small{
    color:#777;
    font-size:14px;
    margin-bottom:6px;
}

.name{
    font-size:26px;
    font-weight:bold;
    line-height:1.2;
}

/* кнопка */
.fab{
    position:absolute;
    right:24px;
    top:50%;
    transform:translateY(-30%);
    width:64px;
    height:64px;
    background:#ff8a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:34px;
}

/* низ меню */
.nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#eee;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    font-size:14px;
}
</style>
</head>

<body>

<div class="top">
    <div class="time">21:28</div>
    <div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">

    <div class="header">
        <div>Резерв ID</div>

        <!-- ОРИГИНАЛЬНЫЙ ГЕРБ SVG -->
        <svg class="coat" viewBox="0 0 512 512">
            <path fill="#000" d="M256 0C167 73 64 96 64 96v128c0 121 82 233 192 288 110-55 192-167 192-288V96s-103-23-192-96z"/>
            <path fill="#fff" d="M256 120l-60 60h40v120h40V180h40z"/>
        </svg>

    </div>

    <div class="content">
        <div class="photo"></div>

        <div class="info">
            Дата народження:
            <b>23.03.1984</b>

            Відстрочка до:
            <b>завершення мобілізації</b>
        </div>
    </div>

    <div class="bar">
        <span>Військовозобов'язаний • Резерв ID • Документ оновлено 18.02.2026 • </span>
    </div>

    <div class="spacer"></div>

    <div class="bottom">
        <div class="small">Військовозобов'язаний</div>
        <div class="name">
            ЛУКАШЕНКО ВІТАЛІЙ<br>
            МИКОЛАЙОВИЧ
        </div>

        <div class="fab">+</div>
    </div>

</div>

<div class="nav">
    <div>Резерв</div>
    <div>Сервіси</div>
    <div>Вакансії</div>
    <div>Меню</div>
</div>

</body>
</html>
