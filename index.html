<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Резерв ID</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b5a2b">

<style>
body {margin:0;background:#d6d2bf;font-family:Arial;}
.phone {max-width:420px;min-height:100vh;margin:0 auto;display:flex;flex-direction:column;justify-content:space-between;}
.topbar {display:flex;justify-content:space-between;padding:12px;}
.notify {background:#eee;padding:6px 12px;border-radius:20px;}
.card {margin:10px;background:#e3dfcc;border-radius:16px;padding:16px;}
.row {display:flex;gap:12px;}
.photo {width:30%;aspect-ratio:3/4;background:#ccc;border-radius:10px;}
.marquee {margin:12px -16px;background:#6b5a2b;color:#fff;overflow:hidden;white-space:nowrap;}
.marquee span {display:inline-block;padding-left:100%;animation:scroll 10s linear infinite;padding:8px 0;}
@keyframes scroll {0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
.name {font-weight:bold;font-size:clamp(16px,4vw,22px);margin-top:10px;}
.bottom {background:#eee;display:flex;justify-content:space-around;padding:10px 0;}
.fab {position:fixed;right:20px;bottom:80px;width:55px;height:55px;background:#ff8c00;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:28px;color:#fff;}
</style>
</head>

<body>

<div class="phone">

<div>
<div class="topbar">
<div>21:28</div>
<div class="notify">Сповіщення 🔔</div>
</div>

<div class="card">
<div class="row">
<div class="photo"></div>
<div>
Дата народження:<br><b>23.03.1984</b><br><br>
Відстрочка до:<br><b>завершення мобілізації</b>
</div>
</div>

<div class="marquee">
<span>Документ оновлено • Військовозобов'язаний • Резерв ID</span>
</div>

<div class="name">
ЛУКАШЕНКО ВІТАЛІЙ<br>МИКОЛАЙОВИЧ
</div>
</div>
</div>

<div class="bottom">
<div>Резерв</div>
<div>Сервіси</div>
<div>Вакансії</div>
<div>Меню</div>
</div>

</div>

<div class="fab">+</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
